<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>SidCity Book Club</title>

        <link rel="icon" type="image/x-icon" href="/icons/logo_dark.svg">

        <link rel="stylesheet" href="css/global.css" />
        <link rel="stylesheet" href="css/colours.css" />
        <link rel="stylesheet" href="css/fonts.css" />
        <link rel="stylesheet" href="css/formatter.css" />

        

    </head>

    <body>
        <header>
            <custom-header></custom-header>
        </header>

        <main>
            <h2>JSON Formatter</h2>

                <div class="input-group">
                    <label for="name">BOOK NAME</label>
                    <input type="text" id="name"/>
                </div>
                

                <div class="input-group">
                <label for="author">AUTHOR NAME</label>
                <input type="text" id="author" list="author-list"/>
                <datalist id="author-list"></datalist>
                </div>

                <div class="input-group">
                <label for="year">YEAR READ</label>
                <input type="number" id="year" min="2020"/>
                </div>

                <div class="input-group">
                <label for="month">MONTH READ</label>
                <select id="month">
                        <option value='1'>January</option>
                        <option value='2'>February</option>
                        <option value='3'>March</option>
                        <option value='4'>April</option>
                        <option value='5'>May</option>
                        <option value='6'>June</option>
                        <option value='7'>July</option>
                        <option value='8'>August</option>
                        <option value='9'>September</option>
                        <option value='10'>October</option>
                        <option value='11'>November</option>
                        <option value='12'>December</option>
                    </select>
                </div>

                <div class="input-group">
                <label for="recommendedBy">RECOMMENDED BY</label>
                <input type="text" id="recommendedBy" list="recommended-list"/>
                <datalist id="recommended-list"></datalist>
                </div>


                <div class="input-group">
                <label for="genre">GENRE</label>
                <input type="text" id="genre" list="genre-list">
                <datalist id="genre-list">
                </datalist>
                </div>

                <div class="input-group">
                <label for="description">BOOK DESCRIPTION</label>
                <textarea id="description" rows="5" cols="33"></textarea>
                </div>

                <div class="input-group">
                <label for="thoughts">CLUB THOUGHTS</label>
                <textarea id="thoughts" rows="5" cols="33"></textarea>
                </div>

                <div class="input-group">
                <label for="cover">COVER</label>
                <input type="text" id="cover"/>
                </div>

                <button type="button" class="generateBtn" onclick="format()"><b>GENERATE</b></button>
                <button type="button" class="clearBtn" onclick="clearForm()"><b>CLEAR</b></button>
                <br>


                <div>
                    <br>
                    <p><b>Book formatted in JSON</b></p>
                    <textarea id="JSONAnswer"></textarea>
                </div>
                


        </main>

        <custom-footer></custom-footer>

        <script src="utils/loadBooks.js"></script>
      <script src="components/header.js"></script>
      <script src="components/footer.js"></script>
      <script src="formatter.js"></script>
    </body>
    
</html>
