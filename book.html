<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>SidCity Book Club</title>

        <link rel="stylesheet" href="css/global.css" />
        <link rel="stylesheet" href="css/colours.css" />
        <link rel="stylesheet" href="css/fonts.css" />

    </head>

    <body>
        <header>
            <custom-header></custom-header>
        </header>

        <main>
            <div class="bookPage">
                <img id="cover" alt=""/>
                <h2 id="name"></h2>
                <p><b class="annotation">Author:</b> <span id="author">Loading...</span></p>
                <p><b class="annotation">Year read:</b> <span id="year">Loading...</span></p>
                <p><b class="annotation">Month read:</b> <span id="month">Loading...</span></p>
                <p><b class="annotation">Recommended by:</b> <span id="recommendedBy">Loading...</span></p>
                <p><b class="annotation">Genre:</b> <span id="genre">Loading...</span></p>
                <p><b class="annotation">Book description:</b> <span id="description">Loading...</span></p>
                <p><b class="annotation">Club thoughts:</b> <span id="thoughts">Loading...</span></p>
                
            </div>
            
        </main>

        <custom-footer></custom-footer>

        <script src="book.js"></script>
        <script src="translateMonth.js"></script>
        <script src="components/header.js"></script>
        <script src="components/footer.js"></script>
    </body>
</html>
