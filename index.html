<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>SidCity Book Club</title>

        <link rel="icon" type="image/x-icon" href="/icons/logo_dark.svg">

        <link rel="stylesheet" href="css/global.css" />
        <link rel="stylesheet" href="css/colours.css" />
        <link rel="stylesheet" href="css/fonts.css" />

        

    </head>

    <body>
        <header>
            <custom-header></custom-header>
        </header>

        <main>
            <h2>home</h2>
            <div id="currentReading">
                <p>What are we currently reading: <b>Left Hand of Darkness - Ursula K. Le Guin</b></p>
            </div>

            <div id="booksTable">
                <h2>books</h2>

                <div id="search">
                    <label for="selectYear">Year</label>
                    <select id="selectYear" onchange="onChangeYear(this.value)">
                        <option value="all" selected>--YEAR--</option>
                        <option value="2020">2020</option>
                        <option value="2021">2021</option>
                        <option value="2022">2022</option>
                        <option value="2023">2023</option>
                        <option value="2024">2024</option>
                        <option value="2025">2025</option>
                        <option value="2026">2026</option>
                    </select>

                    <label for="selectMonth">Month</label>
                    <select id="selectMonth" onchange="onChangeMonth(this.value)">
                        <option value="all" selected>--MONTH--</option>
                        <option value='1'>January</option>
                        <option value='2'>February</option>
                        <option value='3'>March</option>
                        <option value='4'>April</option>
                        <option value='5'>May</option>
                        <option value='6'>June</option>
                        <option value='7'>July</option>
                        <option value='8'>August</option>
                        <option value='9'>September</option>
                        <option value='10'>October</option>
                        <option value='11'>November</option>
                        <option value='12'>December</option>
                    </select>

                    <label for="text">Search:</label>
                    <input type="text" id="text" oninput="onChangeSearch(this.value)">



                </div>


                <div class="table">
                    <table id="table">
                        <thead>
                            <tr >
                                <th>YEAR</th>
                                <th>MONTH</th>
                                <th>BOOK</th>
                                <th>AUTHOR</th>
                                <th>INFO</th>
                            </tr>
                        </thead>
                        <tbody>
                            
                        </tbody>
                    </table>
                </div>
                
            </div>

        </main>

        <custom-footer></custom-footer>

      <script src="index.js"></script>  
      <script src="translateMonth.js"></script>
      <script src="components/header.js"></script>
      <script src="components/footer.js"></script>
    </body>
    
</html>
